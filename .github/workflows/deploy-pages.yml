name: Deploy landing page to GitHub Pages

# 触发条件:推送到 main 且改动了展示页目录或本 workflow 时
on:
  push:
    branches: [main]
    paths:
      - "docs-site/**"
      - ".github/workflows/deploy-pages.yml"
  # 允许在 Actions 页面手动触发
  workflow_dispatch:

# 授予 workflow 部署 Pages 所需的最小权限
permissions:
  contents: read
  pages: write
  id-token: write

# 同一时刻只跑一个部署,新的推送会取消排队中的旧任务
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload static site
        uses: actions/upload-pages-artifact@v3
        with:
          # 只发布展示页目录,不含后端源码
          path: docs-site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
